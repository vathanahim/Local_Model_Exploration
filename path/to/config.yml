# Sample Configuration for Aider

# Default Model (Change this to switch the default model)
default_model: ollama_chat/qwen2.5-coder:7b  # General coding, web development, reasoning

# Other Models
models:
  - name: qwen2.5-coder:7b
    description: "General coding and web development"
  - name: llama3.1:8b
    description: "Lightweight model for general use"
  - name: gemma3:4b
    description: "Reasoning and complex tasks"
  - name: deepseek-coder
    description: "Advanced coding assistance"
  - name: phi3
    description: "Specialized reasoning and knowledge"

# Example usage:
aider --model qwen2.5-coder:7b

# To switch the default model, change the value of `default_model` in this file.
